---
- name: Include repository tasks
  ansible.builtin.include_tasks: repo.yml
- name: Install Common Packages
  ansible.builtin.dnf:
    name:
      - wget
      - unzip
      - curl
      - terraform
      - vault
      - consul
      - nomad
      - waypoint
    disable_gpg_check: true
    state: present

- name: Install nmon on supported RHEL-family releases
  ansible.builtin.dnf:
    name: nmon
    disable_gpg_check: true
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - (ansible_distribution_major_version | int) < 10
