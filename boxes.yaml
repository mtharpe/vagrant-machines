# OS catalog. Each entry maps a friendly OS id to:
#   family:   apt | rpm  (used to pick the ansible playbook)
#   ansible:  the playbook directory under provisioners/ansible/ansible-<ansible>-base/
#   boxes:    box name per provider
#
# Provider keys:
#   utm             Apple Silicon (free; Apple Virtualization.framework via UTM)
#   parallels       Apple Silicon (paid)
#   virtualbox      Linux x86_64, Intel Mac, Windows
#   libvirt         Linux (KVM)
#   vmware_desktop  Apple Silicon + Intel Mac (Fusion is free for personal use)
#   qemu            Apple Silicon fallback (sparse ecosystem; left blank intentionally)
#
# Bento (https://github.com/chef/bento) publishes the same OS image for
# parallels/utm/virtualbox/vmware_desktop on both arm64 and amd64, which is why
# the same box name appears under multiple providers.
#
# Add a custom box: edit this file, or override per-VM with
#   make new os=ubuntu24 provider=parallels box=publisher/name

ubuntu22:
  family: apt
  ansible: ubuntu
  boxes:
    utm:            bento/ubuntu-22.04
    parallels:      bento/ubuntu-22.04
    virtualbox:     bento/ubuntu-22.04
    vmware_desktop: bento/ubuntu-22.04
    libvirt:        generic/ubuntu2204
    qemu:

ubuntu24:
  family: apt
  ansible: ubuntu
  boxes:
    utm:            bento/ubuntu-24.04
    parallels:      bento/ubuntu-24.04
    virtualbox:     bento/ubuntu-24.04
    vmware_desktop: bento/ubuntu-24.04
    libvirt:        generic/ubuntu2404
    qemu:

